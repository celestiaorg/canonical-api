syntax = "proto3";

package celestia.v0.retrievability.types;

import "proof.proto";

////////////////////////////////////////
// Core data types
////////////////////////////////////////

message Share {
  bytes data = 1;
}

message Range {
  uint32 begin = 1;
  uint32 end = 2;
}

message Blob {
  bytes data = 1;
  optional bytes signer = 2;
  bytes commitment = 3;
}

message BlobWithProof {
  optional celestia.v0.retrievability.types.Blob blob = 1;
  optional celestia.v0.retrievability.proof.DataRootProof proof = 2;
  // Index of the first share of the blob in the ODS
  uint64 index = 3;
}

message SharesWithProof {
  // Shares are from the same row
  repeated celestia.v0.retrievability.types.Share shares = 1;
  // NMT proof to the data root
  celestia.v0.retrievability.proof.DataRootProof row_proof = 2;
}
